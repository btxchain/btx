description "BTX Daemon"

start on runlevel [2345]
stop on starting rc RUNLEVEL=[016]

env BTXD_BIN="/usr/bin/btxd"
env BTXD_USER="btx"
env BTXD_GROUP="btx"
env BTXD_PIDDIR="/var/run/btxd"
# upstart can't handle variables constructed with other variables
env BTXD_PIDFILE="/var/run/btxd/btxd.pid"
env BTXD_CONFIGFILE="/etc/btx/btx.conf"
env BTXD_DATADIR="/var/lib/btxd"

expect fork

respawn
respawn limit 5 120
kill timeout 600

pre-start script
    # this will catch non-existent config files
    # btxd will check and exit with this very warning, but it can do so
    # long after forking, leaving upstart to think everything started fine.
    # since this is a commonly encountered case on install, just check and
    # warn here.
    if ! grep -qs '^rpcpassword=' "$BTXD_CONFIGFILE" ; then
        echo "ERROR: You must set a secure rpcpassword to run btxd."
        echo "The setting must appear in $BTXD_CONFIGFILE"
        echo
        echo "This password is security critical to securing wallets "
        echo "and must not be the same as the rpcuser setting."
        echo "You can generate a suitable random password using the following "
        echo "command from the shell:"
        echo
        echo "bash -c 'tr -dc a-zA-Z0-9 < /dev/urandom | head -c32 && echo'"
        echo
        echo "It is recommended that you also set alertnotify so you are "
        echo "notified of problems:"
        echo
        echo "ie: alertnotify=echo %%s | mail -s \"BTX Alert\"" \
            "admin@foo.com"
        echo
        exit 1
    fi

    mkdir -p "$BTXD_PIDDIR"
    chmod 0755 "$BTXD_PIDDIR"
    chown $BTXD_USER:$BTXD_GROUP "$BTXD_PIDDIR"
    chown $BTXD_USER:$BTXD_GROUP "$BTXD_CONFIGFILE"
    chmod 0660 "$BTXD_CONFIGFILE"
end script

exec start-stop-daemon \
    --start \
    --pidfile "$BTXD_PIDFILE" \
    --chuid $BTXD_USER:$BTXD_GROUP \
    --exec "$BTXD_BIN" \
    -- \
    -pid="$BTXD_PIDFILE" \
    -conf="$BTXD_CONFIGFILE" \
    -datadir="$BTXD_DATADIR" \
    -disablewallet \
    -daemon

