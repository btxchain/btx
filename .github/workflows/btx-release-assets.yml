name: BTX Release Assets

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to stage or publish, for example v0.33.0
        required: false
        default: ""
      release_name:
        description: Optional human-readable release title
        required: false
        default: ""
      release_repository:
        description: GitHub repository that will receive the final release assets
        required: true
        default: btxchain/btx
      build_with_guix:
        description: Run contrib/guix/guix-build on the release runner
        required: false
        type: boolean
        default: false
      guix_output_dir:
        description: Optional path to an existing guix-build-*/output directory on the release runner
        required: false
        default: ""
      attestations_dir:
        description: Optional path to the guix.sigs release directory on the release runner
        required: false
        default: ""
      snapshot:
        description: Optional existing snapshot.dat path on the release runner
        required: false
        default: ""
      snapshot_manifest:
        description: Optional existing snapshot.manifest.json path on the release runner
        required: false
        default: ""
      generate_snapshot:
        description: Generate snapshot.dat and snapshot.manifest.json on the release runner
        required: false
        type: boolean
        default: false
      rollback:
        description: Rollback height or blockhash used when generate_snapshot=true
        required: false
        default: ""
      btx_cli:
        description: Path to btx-cli used for snapshot generation
        required: false
        default: btx-cli
      chain:
        description: Human-readable chain label for snapshot generation
        required: false
        default: main
      rpc_args:
        description: Newline-delimited extra btx-cli RPC args for snapshot generation
        required: false
        default: ""
      checksum_signature:
        description: Optional existing SHA256SUMS.asc path on the release runner
        required: false
        default: ""
      sign_with:
        description: Optional local GPG key name used to sign SHA256SUMS
        required: false
        default: ""
      body_file:
        description: Optional release notes file path on the release runner
        required: false
        default: ""
      publish:
        description: Publish to GitHub Releases after staging and validation
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-release-automation:
    name: validate release bundle and publisher scripts
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Smoke test release automation
        run: |
          set -euo pipefail
          python3 -m py_compile \
            scripts/release/collect_release_assets.py \
            scripts/release/publish_github_release.py \
            scripts/release/cut_release.py \
            scripts/release/cut_local_release.py \
            scripts/release/sign_release_bundle.py \
            scripts/release/package_release_archive.py \
            contrib/faststart/btx-agent-setup.py
          python3 scripts/release/collect_release_assets.py --help >/dev/null
          python3 scripts/release/publish_github_release.py --help >/dev/null
          python3 scripts/release/cut_release.py --help >/dev/null
          python3 scripts/release/cut_local_release.py --help >/dev/null
          python3 scripts/release/sign_release_bundle.py --help >/dev/null
          python3 scripts/release/package_release_archive.py --help >/dev/null
          python3 contrib/faststart/btx-agent-setup.py --help >/dev/null

          workdir="$(mktemp -d)"
          archive_root="${workdir}/archives"
          bundle_dir="${workdir}/bundle"
          attestations_root="${workdir}/guix.sigs/0.0.0-test/alice"
          mkdir -p "${archive_root}" "${workdir}/bin"
          mkdir -p "${attestations_root}"

          printf '#!/bin/sh\nexit 0\n' > "${workdir}/bin/btxd"
          printf '#!/bin/sh\nexit 0\n' > "${workdir}/bin/btx-cli"
          printf '#!/bin/sh\nexit 0\n' > "${workdir}/bin/btx-util"
          printf '#!/bin/sh\nexit 0\n' > "${workdir}/bin/btx-util.exe"
          chmod +x "${workdir}/bin/btxd" "${workdir}/bin/btx-cli" "${workdir}/bin/btx-util" "${workdir}/bin/btx-util.exe"
          printf 'snapshot payload\n' > "${workdir}/snapshot.dat"
          printf 'dummy attestation\n' > "${attestations_root}/noncodesigned.SHA256SUMS"

          for platform_id in linux-x86_64 linux-x86_64-cuda12 linux-x86_64-cuda13 linux-arm64 windows-x86_64 macos-x86_64 macos-arm64; do
            python3 scripts/release/package_release_archive.py \
              --output-dir "${archive_root}" \
              --version 0.0.0-test \
              --platform-id "${platform_id}" \
              --btxd "${workdir}/bin/btxd" \
              --btx-cli "${workdir}/bin/btx-cli" \
              >/dev/null
          done

          python3 - "${workdir}/snapshot.dat" "${workdir}/snapshot.manifest.json" <<'PY'
          import hashlib
          import json
          import sys
          from pathlib import Path

          snapshot = Path(sys.argv[1])
          manifest = {
              "format_version": 1,
              "chain": "main",
              "height": 60776,
              "base_block_hash": "4569a09197d96a405ca776fb5274b7de0efaa2ec4e3bafa464bc2ac2ad5c50a0",
              "snapshot_sha256": hashlib.sha256(snapshot.read_bytes()).hexdigest(),
          }
          Path(sys.argv[2]).write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          PY

          python3 scripts/release/collect_release_assets.py \
            --output-dir "${bundle_dir}" \
            --source "${archive_root}" \
            --attestations-dir "${workdir}/guix.sigs/0.0.0-test" \
            --snapshot "${workdir}/snapshot.dat" \
            --snapshot-manifest "${workdir}/snapshot.manifest.json" \
            --release-tag v0.0.0-test \
            --release-name "BTX test release"

          test -f "${bundle_dir}/SHA256SUMS"
          test -f "${bundle_dir}/snapshot.dat"
          test -f "${bundle_dir}/snapshot.manifest.json"
          test -f "${bundle_dir}/btx-release-manifest.json"
          grep -q 'snapshot.dat' "${bundle_dir}/SHA256SUMS"
          grep -q 'snapshot.manifest.json' "${bundle_dir}/SHA256SUMS"
          grep -q 'btx-release-manifest.json' "${bundle_dir}/SHA256SUMS"
          grep -q 'guix-attestations-alice-noncodesigned.SHA256SUMS' "${bundle_dir}/SHA256SUMS"

          python3 scripts/release/publish_github_release.py \
            --repo btxchain/btx-node \
            --tag v0.0.0-test \
            --bundle-dir "${bundle_dir}" \
            --dry-run

          python3 contrib/faststart/btx-agent-setup.py \
            --release-manifest "${bundle_dir}/btx-release-manifest.json" \
            --platform linux-x86_64 \
            --install-dir "${workdir}/install" \
            --json >/dev/null

          test -f "${workdir}/install/btx-0.0.0-test/bin/btxd"
          test -f "${workdir}/install/btx-0.0.0-test/contrib/faststart/btx-faststart.py"
          test -f "${workdir}/install/btx-0.0.0-test/contrib/mining/start-live-mining.sh"

  cut-release-bundle:
    name: cut release bundle
    if: ${{ inputs.tag != '' }}
    needs: validate-release-automation
    runs-on:
      - self-hosted
      - linux
      - x64
      - btx-release
    environment: btx-release
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: main
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Cut release bundle
        env:
          SOURCE_REPOSITORY: ${{ github.repository }}
          INPUT_RELEASE_REPOSITORY: ${{ inputs.release_repository }}
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_RELEASE_NAME: ${{ inputs.release_name }}
          INPUT_BUILD_WITH_GUIX: ${{ inputs.build_with_guix }}
          INPUT_GUIX_OUTPUT_DIR: ${{ inputs.guix_output_dir }}
          INPUT_ATTESTATIONS_DIR: ${{ inputs.attestations_dir }}
          INPUT_GENERATE_SNAPSHOT: ${{ inputs.generate_snapshot }}
          INPUT_BTX_CLI: ${{ inputs.btx_cli }}
          INPUT_CHAIN: ${{ inputs.chain }}
          INPUT_ROLLBACK: ${{ inputs.rollback }}
          INPUT_RPC_ARGS: ${{ inputs.rpc_args }}
          INPUT_SNAPSHOT: ${{ inputs.snapshot }}
          INPUT_SNAPSHOT_MANIFEST: ${{ inputs.snapshot_manifest }}
          INPUT_CHECKSUM_SIGNATURE: ${{ inputs.checksum_signature }}
          INPUT_EXPECTED_SIGNING_FINGERPRINT: ${{ vars.BTX_RELEASE_SIGNING_FINGERPRINT }}
          INPUT_BODY_FILE: ${{ inputs.body_file }}
          INPUT_SIGN_WITH: ${{ inputs.sign_with }}
          INPUT_PUBLISH: ${{ inputs.publish }}
        run: |
          set -euo pipefail
          bundle_dir="${RUNNER_TEMP}/btx-release-bundle"
          source_commit="$(git rev-parse HEAD)"

          [[ "${INPUT_RELEASE_REPOSITORY}" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]] || {
            echo 'release_repository must use owner/name syntax' >&2
            exit 2
          }
          [[ "${INPUT_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9.-]+)?$ ]] || {
            echo 'tag must be an explicit semantic release tag such as v0.33.0' >&2
            exit 2
          }
          [[ "${source_commit}" =~ ^[0-9a-f]{40}$ ]] || exit 2
          if [[ -n "${INPUT_EXPECTED_SIGNING_FINGERPRINT}" ]] &&
             [[ ! "${INPUT_EXPECTED_SIGNING_FINGERPRINT// /}" =~ ^[0-9A-Fa-f]{40}$ ]]; then
            echo 'expected_signing_fingerprint must contain exactly 40 hexadecimal characters' >&2
            exit 2
          fi
          if [[ "${INPUT_PUBLISH}" == 'true' ]] &&
             [[ -z "${INPUT_EXPECTED_SIGNING_FINGERPRINT}" ]]; then
            echo 'publishing requires an explicitly authorized expected_signing_fingerprint' >&2
            exit 2
          fi
          if [[ -n "${INPUT_CHECKSUM_SIGNATURE}" && -n "${INPUT_SIGN_WITH}" ]]; then
            echo 'checksum_signature and sign_with are mutually exclusive' >&2
            exit 2
          fi
          if [[ "${INPUT_PUBLISH}" == 'true' && -z "${INPUT_CHECKSUM_SIGNATURE}" && -z "${INPUT_SIGN_WITH}" ]]; then
            echo 'publishing requires either checksum_signature or sign_with' >&2
            exit 2
          fi

          cmd=(
            python3 scripts/release/cut_release.py
            --repo "${INPUT_RELEASE_REPOSITORY}"
            --tag "${INPUT_TAG}"
            --source-repository "${SOURCE_REPOSITORY}"
            --source-commit "${source_commit}"
            --bundle-dir "${bundle_dir}"
          )

          if [[ -n "${INPUT_RELEASE_NAME}" ]]; then
            cmd+=(--release-name "${INPUT_RELEASE_NAME}")
          fi
          if [[ "${INPUT_BUILD_WITH_GUIX}" == 'true' ]]; then
            cmd+=(--build-with-guix)
          fi
          if [[ -n "${INPUT_GUIX_OUTPUT_DIR}" ]]; then
            cmd+=(--guix-output-dir "${INPUT_GUIX_OUTPUT_DIR}")
          fi
          if [[ -n "${INPUT_ATTESTATIONS_DIR}" ]]; then
            cmd+=(--attestations-dir "${INPUT_ATTESTATIONS_DIR}")
          fi
          if [[ "${INPUT_GENERATE_SNAPSHOT}" == 'true' ]]; then
            cmd+=(--generate-snapshot --btx-cli "${INPUT_BTX_CLI}" --chain "${INPUT_CHAIN}")
            if [[ -n "${INPUT_ROLLBACK}" ]]; then
              cmd+=(--rollback "${INPUT_ROLLBACK}")
            fi
            while IFS= read -r rpc_arg; do
              [[ -n "${rpc_arg}" ]] || continue
              rpc_arg_name="${rpc_arg,,}"
              rpc_arg_name="${rpc_arg_name#"${rpc_arg_name%%[![:space:]]*}"}"
              if [[ "${rpc_arg_name}" =~ ^--?(rpcpassword|rpcuser|rpcauth)= ]]; then
                echo 'inline RPC credentials are forbidden; use a protected cookie/datadir configuration' >&2
                exit 2
              fi
              cmd+=("--rpc-arg=${rpc_arg}")
            done <<<"${INPUT_RPC_ARGS}"
          else
            if [[ -n "${INPUT_SNAPSHOT}" ]]; then
              cmd+=(--snapshot "${INPUT_SNAPSHOT}")
            fi
            if [[ -n "${INPUT_SNAPSHOT_MANIFEST}" ]]; then
              cmd+=(--snapshot-manifest "${INPUT_SNAPSHOT_MANIFEST}")
            fi
          fi
          if [[ -n "${INPUT_CHECKSUM_SIGNATURE}" ]]; then
            cmd+=(--checksum-signature "${INPUT_CHECKSUM_SIGNATURE}")
          fi
          if [[ -n "${INPUT_BODY_FILE}" ]]; then
            cmd+=(--body-file "${INPUT_BODY_FILE}")
          fi
          cmd+=(--smoke-platform linux-x86_64)

          echo "Cutting ${INPUT_TAG} from ${SOURCE_REPOSITORY}@${source_commit} for ${INPUT_RELEASE_REPOSITORY}"
          "${cmd[@]}"

      - name: Sign final bundle checksums
        if: ${{ inputs.sign_with != '' && inputs.checksum_signature == '' }}
        env:
          BTX_GPG_PASSPHRASE: ${{ secrets.BTX_GPG_PASSPHRASE }}
          INPUT_SIGN_WITH: ${{ inputs.sign_with }}
          EXPECTED_SIGNING_FINGERPRINT: ${{ vars.BTX_RELEASE_SIGNING_FINGERPRINT }}
        run: |
          set -euo pipefail
          test -n "${EXPECTED_SIGNING_FINGERPRINT}"
          python3 scripts/release/sign_release_bundle.py \
            --bundle-dir "${RUNNER_TEMP}/btx-release-bundle" \
            --sign-with "${INPUT_SIGN_WITH}" \
            --expected-signing-fingerprint "${EXPECTED_SIGNING_FINGERPRINT}" \
            --gpg-passphrase-env BTX_GPG_PASSPHRASE

      - name: Validate public release identity and signature
        if: ${{ inputs.publish }}
        env:
          SOURCE_REPOSITORY: ${{ github.repository }}
          RELEASE_REPOSITORY: ${{ inputs.release_repository }}
          RELEASE_TAG: ${{ inputs.tag }}
          EXPECTED_SIGNING_FINGERPRINT: ${{ vars.BTX_RELEASE_SIGNING_FINGERPRINT }}
        run: |
          set -euo pipefail
          source_commit="$(git rev-parse HEAD)"
          python3 scripts/release/publish_github_release.py \
            --repo "${RELEASE_REPOSITORY}" \
            --tag "${RELEASE_TAG}" \
            --target-commit "${source_commit}" \
            --expected-signing-fingerprint "${EXPECTED_SIGNING_FINGERPRINT}" \
            --bundle-dir "${RUNNER_TEMP}/btx-release-bundle" \
            --validate-public-release \
            --dry-run

      - name: Publish verified bundle
        if: ${{ inputs.publish }}
        env:
          BTX_GITHUB_TOKEN: ${{ secrets.BTX_GITHUB_TOKEN }}
          RELEASE_REPOSITORY: ${{ inputs.release_repository }}
          RELEASE_TAG: ${{ inputs.tag }}
          RELEASE_NAME: ${{ inputs.release_name }}
          BODY_FILE: ${{ inputs.body_file }}
          EXPECTED_SIGNING_FINGERPRINT: ${{ vars.BTX_RELEASE_SIGNING_FINGERPRINT }}
        run: |
          set -euo pipefail
          source_commit="$(git rev-parse HEAD)"
          cmd=(
            python3 scripts/release/publish_github_release.py
            --repo "${RELEASE_REPOSITORY}"
            --tag "${RELEASE_TAG}"
            --target-commit "${source_commit}"
            --expected-signing-fingerprint "${EXPECTED_SIGNING_FINGERPRINT}"
            --bundle-dir "${RUNNER_TEMP}/btx-release-bundle"
            --publish
          )
          [[ -z "${RELEASE_NAME}" ]] || cmd+=(--release-name "${RELEASE_NAME}")
          [[ -z "${BODY_FILE}" ]] || cmd+=(--body-file "${BODY_FILE}")
          "${cmd[@]}"

      - name: Upload bundle artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: btx-release-bundle-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/btx-release-bundle

      - name: Upload snapshot metadata artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: btx-release-snapshot-metadata-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            ${{ github.workspace }}/release-artifacts/*/snapshot/snapshot.report.json
            ${{ github.workspace }}/release-artifacts/*/snapshot/snapshot.manifest.json
