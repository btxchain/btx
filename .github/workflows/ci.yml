name: CI

on:
  workflow_dispatch:


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  centos-gate:
    name: Linux CentOS Stream 10 container, native
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    env:
      CC: gcc
      CXX: g++
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Toolchain info
        run: |
          set -euo pipefail
          uname -a
          if command -v lsb_release >/dev/null 2>&1; then lsb_release -a; fi
          gcc --version || true
          cmake --version
          python3 --version
          docker --version || true
          docker buildx version || true

      - name: Free disk space
        run: |
          set -euo pipefail
          echo "=== Before cleanup ==="
          df -h /tmp
          # Remove large preinstalled packages to free /tmp (which shares the root partition)
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost || true
          sudo apt-get clean || true
          docker system prune --force --volumes || true
          echo "=== After cleanup ==="
          df -h /tmp

      - name: Run target
        run: |
          set -euo pipefail
          chmod +x scripts/ci/run_ci_target.sh
          scripts/ci/run_ci_target.sh "platform-native-centos"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-platform-native-centos-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            ci/scratch

  platform-matrix:
    name: ${{ matrix.name }}
    needs: centos-gate
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: ${{ matrix.timeout_minutes }}
    env:
      CC: clang
      CXX: clang++
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: lint
            target: lint
            runs_on: ubuntu-24.04
            timeout_minutes: 45
          - name: macOS 14 native, arm64, no depends, sqlite only, gui
            target: platform-macos-native
            runs_on: macos-14
            timeout_minutes: 180
          - name: macOS 14 native, arm64, fuzz
            target: platform-macos-native-fuzz
            runs_on: macos-14
            timeout_minutes: 180
          - name: tidy
            target: tidy
            runs_on: ubuntu-24.04
            timeout_minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        if: matrix.target == 'lint'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Linux tidy deps
        if: runner.os == 'Linux' && matrix.target == 'tidy'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            clang-tidy-18 \
            clang-tools-18 \
            llvm-18

      - name: Toolchain info
        run: |
          set -euo pipefail
          uname -a
          if command -v sw_vers >/dev/null 2>&1; then sw_vers; fi
          if command -v lsb_release >/dev/null 2>&1; then lsb_release -a; fi
          clang --version || true
          gcc --version || true
          cmake --version
          python3 --version
          if command -v python3.11 >/dev/null 2>&1; then python3.11 --version; fi
          docker --version || true
          docker buildx version || true

      - name: Run target
        run: |
          set -euo pipefail
          chmod +x scripts/ci/run_ci_target.sh
          scripts/ci/run_ci_target.sh "${{ matrix.target }}"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-${{ matrix.target }}-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            ci/scratch
