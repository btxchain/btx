name: libbitcoinpqc WASM

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/libbitcoinpqc-wasm.yml"
      - "src/libbitcoinpqc/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/libbitcoinpqc-wasm.yml"
      - "src/libbitcoinpqc/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wasm:
    name: Build and verify btx-pqc.wasm
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.61
          actions-cache-folder: emsdk-cache

      - name: Build WASM module
        run: |
          ./src/libbitcoinpqc/wasm/build-wasm.sh

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify keygen / sign / verify in Node
        run: |
          node ./src/libbitcoinpqc/wasm/test/test-wasm.mjs

      - name: Native parity check (same entropy -> same keys as native lib)
        run: |
          cmake -B /tmp/pqc-native -S src/libbitcoinpqc -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/pqc-native -j"$(nproc)"
          cc -O2 -I src/libbitcoinpqc/include \
             src/libbitcoinpqc/wasm/test/native_parity.c \
             /tmp/pqc-native/lib/libbitcoinpqc.a \
             -o /tmp/native-parity
          /tmp/native-parity > /tmp/native-parity.out
          node ./src/libbitcoinpqc/wasm/test/print-wasm-vectors.mjs > /tmp/wasm-parity.out
          diff -u /tmp/native-parity.out /tmp/wasm-parity.out
          echo "Native and WASM keygen outputs are identical."

      - name: Record artifact checksums
        run: |
          sha256sum src/libbitcoinpqc/wasm/dist/btx-pqc.js src/libbitcoinpqc/wasm/dist/btx-pqc.mjs src/libbitcoinpqc/wasm/dist/btx-pqc.wasm | tee checksums-wasm.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: btx-pqc-wasm
          path: |
            src/libbitcoinpqc/wasm/dist/btx-pqc.js
            src/libbitcoinpqc/wasm/dist/btx-pqc.mjs
            src/libbitcoinpqc/wasm/dist/btx-pqc.wasm
            checksums-wasm.txt
          if-no-files-found: error
